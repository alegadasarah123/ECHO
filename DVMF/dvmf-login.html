<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTU VET MED - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .left-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: white;
        }
        .logo {
            width: 700px;
            height: 700px;
            margin-top: 80px;
            object-fit: contain;
        }
        .right-panel {
            width: 50%;
            background-color: #0F3D5A;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 0;
            position: relative;
            height: 100%;
        }
        .content-container {
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .header-section {
            padding-top: 30px;
            margin-bottom: 20px;
        }
        .welcome-text {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .sign-in-text {
            font-size: 16px;
            margin-bottom: 40px;
        }
        .form-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
        }
        .form-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            margin-bottom: 15px;
        }
        .form-group div {
            height: 55px;
            width: 100%;
            border: 2px solid white;
            border-radius: 20px;
            position: relative;
            margin: 0 auto;
        }
        .form-group input {
            width: 100%;
            height: 100%;
            padding: 12px;
            border: none;
            outline: none;
            font-size: 14px;
            background-color: transparent;
            color: white;
            border-radius: 20px;
        }
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        .form-group h3 {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #0F3D5A;
            padding: 0 10px;
            font-size: 12px;
            color: white;
        }
        .forgot-password {
            text-align: right;
            font-size: 14px;
            margin-top: 5px;
            cursor: pointer;
            width: 100%;
            text-decoration: underline;
        }
        .forgot-password:hover {
            opacity: 0.8;
        }
        .login-btn-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            width: 100%;
        }
        .login-btn {
            background-color: white;
            color: #0F3D5A;
            border: none;
            border-radius: 20px;
            padding: 8px 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            min-width: 120px;
            transition: all 0.3s ease;
        }
        .login-btn:hover {
            background-color: #f0f0f0;
            transform: translateY(-2px);
        }
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .error-message {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 5px;
            text-align: center;
            display: none;
        }
        .loading {
            display: none;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
        }
        /* Responsive design */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .left-panel, .right-panel {
                width: 100%;
                height: 50%;
            }
            .logo {
                width: 300px;
                height: 300px;
                margin-top: 20px;
            }
            .welcome-text {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="left-panel">
        <img src="LOGO1.png" alt="CTU Logo" class="logo">
    </div>
    <div class="right-panel">
        <div class="content-container">
            <div class="header-section">
                <h1 class="welcome-text">Welcome back!</h1>
                <p class="sign-in-text">Sign in to your account</p>
            </div>
            
            <div class="form-section">
                <form class="login-form" id="loginForm">
                    <div class="form-group">
                        <div>
                            <h3>Username</h3>
                            <input type="text" id="username" name="username" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <div>
                            <h3>Password</h3>
                            <input type="password" id="password" name="password" required>
                        </div>
                    </div>
                    
                    <div class="error-message" id="errorMessage">
                        Invalid username or password. Please try again.
                    </div>
                    
                    <div class="forgot-password" onclick="handleForgotPassword()">Forgot Password?</div>
                    
                    <div class="loading" id="loadingMessage">
                        Signing you in...
                    </div>
                    
                    <div class="login-btn-container">
                        <button type="submit" class="login-btn" id="loginBtn">Login</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Handle form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent default form submission
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const loginBtn = document.getElementById('loginBtn');
            const errorMessage = document.getElementById('errorMessage');
            const loadingMessage = document.getElementById('loadingMessage');
            
            // Hide error message
            errorMessage.style.display = 'none';
            
            // Basic validation
            if (!username || !password) {
                errorMessage.textContent = 'Please fill in all fields.';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Show loading state
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';
            loadingMessage.style.display = 'block';
            
            // Simulate login process (you can replace this with actual authentication)
            setTimeout(() => {
                // For demo purposes, accept any non-empty username and password
                // In a real application, you would validate against a server
                
                if (username && password) {
                    // Successful login - redirect to dashboard
                    console.log('Login successful for user:', username);
                    
                    // Store user info in localStorage (optional)
                    localStorage.setItem('currentUser', username);
                    localStorage.setItem('loginTime', new Date().toISOString());
                    
                    // Redirect to dashboard
                    window.location.href = 'dvmf-dashboard.html';
                } else {
                    // Failed login
                    errorMessage.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                    loadingMessage.style.display = 'none';
                }
            }, 1500); // 1.5 second delay to simulate server response
        });
        
        // Handle forgot password
        function handleForgotPassword() {
            alert('Forgot Password functionality would be implemented here.\n\nFor now, please contact your administrator:\nEmail: admin@ctu.edu.ph\nPhone: +63-32-XXX-XXXX');
        }
        
        // Handle Enter key press
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
        
        // Clear error message when user starts typing
        document.getElementById('username').addEventListener('input', function() {
            document.getElementById('errorMessage').style.display = 'none';
        });
        
        document.getElementById('password').addEventListener('input', function() {
            document.getElementById('errorMessage').style.display = 'none';
        });
        
        // Initialize page
        console.log('CTU VET MED Login Page initialized');
        
        // Focus on username field when page loads
        window.addEventListener('load', function() {
            document.getElementById('username').focus();
        });
    </script>
</body>
</html>
