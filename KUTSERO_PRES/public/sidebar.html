<style>

    .sidebar {
        background: linear-gradient(135deg, #D2691E 0%, #CD853F 100%);
        width: 80px;
        transition: width 0.3s ease;
        position: fixed;
        height: 100vh;
        z-index: 1000;
        overflow: hidden;
    }

    .sidebar:hover {
        width: 250px;
    }

    .sidebar-header {
        padding: 1.5rem;
        display: flex;
        align-items: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
        width: 40px;
        height: 40px;
        min-width: 40px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .logo img {
        width: 50px;
        height: 50px;
        filter: brightness(0) invert(1);
    }

    .logo-text {
        margin-left: 1rem;
        color: white;
        font-size: 1.2rem;
        font-weight: 600;
        white-space: nowrap;
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .sidebar:hover .logo-text {
        opacity: 1;
    }

    .nav-menu {
        padding: 2rem 0;
    }

    .nav-item {
        display: flex;
        align-items: center;
        padding: 1rem 1.5rem;
        color: white;
        text-decoration: none;
        transition: all 0.3s ease;
        cursor: pointer;
        margin: 0.5rem 0;
    }

    .nav-item:hover {
        background: rgba(255, 255, 255, 0.1);
    }

    .nav-item.active {
        background: rgba(255, 255, 255, 0.2);
        border-right: 4px solid white;
    }

    .nav-icon {
        width: 24px;
        height: 24px;
        min-width: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .nav-icon img {
        width: 20px;
        height: 20px;
        filter: brightness(0) invert(1);
    }

    .nav-text {
        margin-left: 1rem;
        white-space: nowrap;
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .sidebar:hover .nav-text {
        opacity: 1;
    }

    .logout {
        position: absolute;
        bottom: 2rem;
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        padding: 1.5rem;
        text-decoration: none;
        color: white;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.3s ease;
    }

    .logout:hover {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 8px;
    }
</style>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <img src="Images/logo.png" alt="Logo" />
    </div>
    <div class="logo-text">ECHO</div>
  </div>

  <div class="nav-menu">
    <a class="nav-item" href="dashboard.html">
    <div class="nav-icon"><img src="Images/dashboard.png" alt="Dashboard" /></div>
    <div class="nav-text">Dashboard</div>
    </a>
    <a class="nav-item" href="userManagement.html">
    <div class="nav-icon"><img src="Images/user.png" alt="User Management" /></div>
    <div class="nav-text">User Management</div>
    </a>
    <a class="nav-item" href="messages.html">
    <div class="nav-icon"><img src="Images/messages.png" alt="Messages" /></div>
    <div class="nav-text">Messages</div>
    </a>
    <a class="nav-item" href="settings.html">
    <div class="nav-icon"><img src="Images/settings.png" alt="Settings" /></div>
    <div class="nav-text">Settings</div>
    </a>

  <a class="logout" href="#">
    <div class="nav-icon"><img src="Images/logout.png" alt="Logout" /></div>
    <div class="nav-text">Logout</div>
  </a>
</div>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const currentPage = window.location.pathname.split("/").pop() || "index.html";

    document.querySelectorAll(".nav-item").forEach(item => {
      const href = item.getAttribute("href");
      if (href && href === currentPage) {
        item.classList.add("active");
        console.log("Activated:", href); 
      }
    });
  });
</script>
