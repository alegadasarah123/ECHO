<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ECHO-Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      display: flex;
      background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
    }

    .container {
      display: flex;
      width: 100%;
      height: 100vh;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .logo-section {
      flex: 1;
      background: linear-gradient(135deg, #f8f8f8 0%, #ffffff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-direction: column;
    }

    .logo-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at center, rgba(139, 69, 19, 0.05) 0%, transparent 70%);
    }

    .logo-image {
      max-width: 280px;
      max-height: 320px;
      object-fit: contain;
      filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.2));
      transition: transform 0.3s ease;
    }

    .logo-image:hover {
      transform: scale(1.05);
    }

   .register-section {
            flex: 1;
            background: linear-gradient(135deg, #47874C 0%, #2F5F34 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        
    .register-section::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 100%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }

    .register-form {
      background-color: transparent;
      width: 100%;
      max-width: 360px;
      padding: 20px;
      border-radius: 12px;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .welcome-text h1 {
      font-size: 22px;
      font-weight: bold;
    }

    .welcome-text p {
      margin-bottom: 12px;
      font-size: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    label {
      font-size: 13px;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="tel"],
    input[type="date"],
    select {
      border: none;
      border-radius: 25px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
      background-color: #fff;
      color: #333;
    }

    ::placeholder {
      color: #aaa;
    }

    .submit-btn {
      align-self: flex-end;
      background-color: #1f1f1f;
      color: white;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .submit-btn:hover {
      background-color: #333;
    }

     .back-button {
      background-color: #ffffff;
      color: #2F5F34;
      border: none;
      padding: 8px 16px;
      font-size: 14px;
      border-radius: 20px;
      cursor: pointer;
      align-self: flex-start;
      font-weight: bold;
      margin-bottom: 12px;
      transition: background-color 0.3s ease;
    }

    .back-button:hover {
      background-color: #e0e0e0;
    }

    /*Responsive Styles*/
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .logo-section {
        flex: 0 0 40%;
        min-height: 40vh;
      }

      .register-section {
        flex: 1;
        padding: 1.5rem;
      }

      .register-form {
        padding: 1rem;
      }

      .logo-image {
        max-width: 200px;
      }
    }

    @media (max-width: 480px) {
      .logo-section {
        flex: 0 0 35%;
      }

      .logo-image {
        max-width: 160px;
      }

      .form-group input {
        padding: 0.8rem 1rem;
      }

      .submit-btn {
        width: 40px;
        height: 40px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-section">
      <img src="/Images/logo.png" alt="President Logo" class="logo-image">
    </div>
    <div class="register-section">
      <form class="register-form">

        <button type="button" class="back-button" id="back-btn">← Back</button>

        <div class="welcome-text">
          <h1>Create an account</h1>
          <p>Please complete the information below.</p>
        </div>

        <div class="form-group">
          <label for="firstName">Your Name</label>
          <input type="text" id="firstName" name="firstName" placeholder="First Name" required>
          <input type="text" id="middleName" name="middleName" placeholder="Middle Name">
          <input type="text" id="lastName" name="lastName" placeholder="Last Name" required>
        </div>

        <div class="form-group">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" name="dob" required>
        </div>

        <div class="form-group">
          <label for="sex">Sex</label>
          <select id="sex" name="sex" required>
            <option value="">Please Select</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
        </div>

        <button type="submit" class="submit-btn">
          ➜
        </button>
      </form>
    </div>
  </div>

 <script>
    document.addEventListener("DOMContentLoaded", function () {
      const dobInput = document.getElementById("dob");

      if (dobInput) {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        const maxDate = `${yyyy}-${mm}-${dd}`;

        dobInput.setAttribute("max", maxDate);
      }

      const backBtn = document.getElementById("back-btn");
      if (backBtn) {
        backBtn.addEventListener("click", () => {
          history.back(); 
        });
      }
    });
  </script>
</body>
</html>
