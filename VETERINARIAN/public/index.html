<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO-Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            padding: 2rem 1rem;
            overflow: hidden;
            position: relative;
        }

        /* Floating circles animation */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: transparent;
            border: 2px solid;
            animation: float-up linear infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes float-up {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 80%;
            min-height: auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            transform: translateY(0);
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        .logo-section {
            flex: 1;
            background: linear-gradient(135deg, #f8f8f8 0%, #ffffff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-direction: column;
            min-height: 600px;
            transition: all 0.5s ease;
        }

        .logo-section:hover {
            background: linear-gradient(135deg, #f0f0f0 0%, #ffffff 100%);
        }

        .logo-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, rgba(139, 69, 19, 0.05) 0%, transparent 70%);
            transition: all 0.5s ease;
            z-index: 0;
        }

        .logo-section:hover::before {
            transform: scale(1.05);
            opacity: 0.8;
        }

        .logo-image {
            max-width: 280px;
            max-height: 320px;
            width: auto;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.2));
            transition: transform 0.3s ease, filter 0.3s ease;
            z-index: 1;
        }

        .logo-image:hover {
            transform: scale(1.08) rotate(2deg);
            filter: drop-shadow(0 15px 35px rgba(0, 0, 0, 0.3));
        }

        .login-section {
            flex: 1;
            background: linear-gradient(135deg, #47874C 0%, #2F5F34 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
            position: relative;
            overflow: hidden;
            min-height: 600px;
            transition: all 0.5s ease;
        }

        .login-section:hover {
            background: linear-gradient(135deg, #3a7a40 0%, #28532d 100%);
        }

        .login-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        .login-section:hover::before {
            opacity: 0.8;
            animation-duration: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .login-form {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2.5rem;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 
                0 15px 30px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            position: relative;
            z-index: 2;
            transition: all 0.3s ease;
        }

        .login-form:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.2),
                inset 0 2px 0 rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.15);
        }

        .welcome-text {
            text-align: center;
            margin-bottom: 2rem;
        }

        .welcome-text h1 {
            color: white;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .login-form:hover .welcome-text h1 {
            transform: translateY(-3px);
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .welcome-text p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            font-weight: 300;
            transition: all 0.3s ease;
        }

        .login-form:hover .welcome-text p {
            transform: translateY(-2px);
        }

        .form-group {
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

        .login-form:hover .form-group {
            transform: translateY(-1px);
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }

        .login-form:hover .forgot-password {
            transform: translateY(-1px);
        }

        .forgot-password a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 0.9rem;
            font-style: italic;
            transition: color 0.3s ease;
        }

        .forgot-password a:hover {
            color: white;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .login-btn {
            width: 100%;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0.1) 100%);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.2) 100%);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .register-link {
            margin-top: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .login-form:hover .register-link {
            transform: translateY(-1px);
        }

        .register-link p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
        }

        .register-link a {
            color: #ffffff;
            text-decoration: underline;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .register-link a:hover {
            color: #d4ffd2;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }

        /* Responsive Design */
        @media (max-width: 968px) {
            .container {
                flex-direction: column;
                max-width: 500px;
                min-height: auto;
            }

            .logo-section {
                flex: none;
                min-height: 300px;
                padding: 2rem;
            }

            .logo-image {
                max-width: 200px;
                max-height: 200px;
            }

            .login-section {
                flex: none;
                min-height: auto;
                padding: 2rem;
            }

            .login-form {
                max-width: none;
                padding: 2rem;
            }

            .welcome-text h1 {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem 0.5rem;
            }

            .container {
                border-radius: 15px;
                max-width: 95%;
            }

            .logo-section {
                min-height: 250px;
                padding: 1.5rem;
            }

            .logo-image {
                max-width: 150px;
                max-height: 150px;
            }
            
            .login-form {
                padding: 1.5rem;
            }

            .welcome-text h1 {
                font-size: 1.6rem;
            }

            .form-group input {
                padding: 0.8rem 1.2rem;
            }

            .login-btn {
                padding: 0.8rem 1.5rem;
            }
        }

        /* Animation styles */
        @keyframes slideInLeft {
            from { 
                transform: translateX(-100px) rotate(-5deg); 
                opacity: 0; 
            }
            to { 
                transform: translateX(0) rotate(0); 
                opacity: 1; 
            }
        }

        @keyframes slideInRight {
            from { 
                transform: translateX(100px) rotate(5deg); 
                opacity: 0; 
            }
            to { 
                transform: translateX(0) rotate(0); 
                opacity: 1; 
            }
        }

        .slide-in-left {
            animation: slideInLeft 0.8s ease-out both;
        }

        .slide-in-right {
            animation: slideInRight 0.8s ease-out both;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <img src="/Images/logo.png" alt="President Logo" class="logo-image">
        </div>
        <div class="login-section">
            <form class="login-form">
                <div class="welcome-text">
                    <h1>Welcome back!</h1>
                    <p>Sign in to your account</p>
                </div>
                
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                
                <div class="forgot-password">
                    <a href="#" onclick="alert('Password reset functionality would be implemented here')">Forgot Password?</a>
                </div>
                
                <button type="submit" class="login-btn" onclick="handleLogin(event)">Login</button>

                <div class="register-link">
                    <p>Don't have an account? <a href="register.html">Register</a></p>
                </div>
            </form>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username && password) {
                // Navigate to dashboard.html
                window.location.href = 'dashboard.html';
            } else {
                alert('Please fill in both username and password fields.');
            }
        }

        // Create floating circles with specified colors
        function createFloatingCircles() {
            const colors = ['#47874C', '#2F5F34'];
            const body = document.body;
            
            for (let i = 0; i < 12; i++) {
                const circle = document.createElement('div');
                circle.classList.add('circle');
                
                // Random properties
                const size = Math.random() * 80 + 20;
                const posX = Math.random() * window.innerWidth;
                const posY = window.innerHeight + size;
                const color = colors[Math.floor(Math.random() * colors.length)];
                const duration = Math.random() * 25 + 15;
                const delay = Math.random() * 10;
                const opacity = Math.random() * 0.4 + 0.1;
                const blur = Math.random() * 3 + 1;
                
                // Apply styles
                circle.style.width = `${size}px`;
                circle.style.height = `${size}px`;
                circle.style.left = `${posX}px`;
                circle.style.top = `${posY}px`;
                circle.style.borderColor = color;
                circle.style.animationDuration = `${duration}s`;
                circle.style.animationDelay = `${delay}s`;
                circle.style.opacity = opacity;
                circle.style.filter = `blur(${blur}px)`;
                
                body.appendChild(circle);
                
                // Remove circle after animation completes
                setTimeout(() => {
                    circle.remove();
                }, duration * 1000);
            }
        }

        // Add subtle animations on load
        window.addEventListener('load', function() {
            const logo = document.querySelector('.logo-image');
            const form = document.querySelector('.login-form');
            
            if (logo) logo.classList.add('slide-in-left');
            if (form) form.classList.add('slide-in-right');
            
            // Create initial circles
            createFloatingCircles();
            
            // Create new circles periodically
            setInterval(createFloatingCircles, 2000);
        });

        // Handle window resize
        window.addEventListener('resize', function() {
            const circles = document.querySelectorAll('.circle');
            circles.forEach(circle => circle.remove());
        });
    </script>
</body>
</html>
